name: Update Telegram Posts

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # هر 30 دقیقه یکبار (دلخواه)

jobs:
  update-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run telegram_script.py
        run: python telegram_script.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add telegram-posts.html posts_formatted.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Telegram posts"
          git push
